title: Ahan Shabanov
name: Akhmedkhan (Ahan) Shabanov
position: PhD student
email: sha.ahan10@gmail.com
description: |
  Hi! I'm a PhD student at [Simon Fraser University](https://www.sfu.ca) in Vancouver, advised by [Andrea Tagliasacchi](https://taiya.github.io). I work on 3D computer vision.

  During my PhD, I spent time as a research intern at [Meta](https://research.facebook.com/) in Zurich, focusing on generative 3D reconstruction. Before that, I was a research engineer and founding member at [Avaturn](https://avaturn.me), collaborating with [Dmitry Ulyanov](https://scholar.google.com/citations?user=du1SBVMAAAAJ&hl=en) on 3D human body and face reconstruction from in-the-wild images. Earlier, I did my BSc and MSc in Applied Mathematics and Physics at the [Moscow Institute of Physics and Technology](https://eng.mipt.ru/).
  
