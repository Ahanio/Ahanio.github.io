<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualization Gallery</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DZ8CMJ3JG1"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-DZ8CMJ3JG1', {
            page_title: 'Failure Art Gallery',
            page_path: '/failure_art/gallery.html'
        });
        gtag('event', 'subsite_view', {
            subsite: 'failure_art'
        });
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --surface: #f8f6f1;
            --surface-strong: #f1ede3;
            --text: #191919;
            --text-muted: #6f6a61;
            --border: rgba(74, 63, 44, 0.10);
            --shadow: 0 18px 40px rgba(23, 20, 15, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            color: var(--text);
            font-family: "Source Sans 3", Arial, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(232, 224, 208, 0.65), transparent 28rem),
                linear-gradient(180deg, #ffffff 0%, var(--surface) 100%);
            overflow-x: hidden;
        }

        .page {
            max-width: 1180px;
            margin: 0 auto;
            padding: 42px 24px 56px;
        }

        .intro {
            max-width: 760px;
            margin: 0 auto 34px;
            text-align: center;
        }

        .eyebrow {
            margin: 0 0 10px;
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-family: "Cormorant Garamond", Georgia, serif;
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 600;
            line-height: 0.96;
            letter-spacing: 0.01em;
        }

        .intro p {
            margin: 14px auto 0;
            max-width: 42rem;
            color: var(--text-muted);
            font-size: 1.02rem;
            line-height: 1.6;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 18px;
        }

        .gallery-item {
            margin: 0;
        }

        .gallery img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 14px;
            cursor: pointer;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            background: var(--surface-strong);
            transition: transform 0.3s ease-in-out;
        }

        .gallery img:hover {
            transform: translateY(-2px) scale(1.02);
        }

        .gallery img.zoomed {
            transform: scale(1.02);
        }

        .zoom-image {
            position: fixed;
            top: 0;
            left: 0;
            transform: translate(0, 0);
            z-index: 10;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.28);
            transition: top 0.3s ease-in-out, left 0.3s ease-in-out, width 0.3s ease-in-out, height 0.3s ease-in-out, transform 0.3s ease-in-out;
            object-fit: contain;
            pointer-events: none;
            box-shadow: 0 26px 70px rgba(0, 0, 0, 0.28);
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(22, 18, 13, 0.68);
            backdrop-filter: blur(5px);
            z-index: 5;
        }

        .overlay.active {
            display: block;
        }

        @media (max-width: 700px) {
            .page {
                padding: 28px 16px 40px;
            }

            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 12px;
            }

            .gallery img {
                border-radius: 12px;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <header class="intro">
            <p class="eyebrow">Failure Art Gallery</p>
            <h1>Beautiful Bugs</h1>
            <p>Images from failed runs that ended up visually compelling.</p>
        </header>

        <div class="gallery">
            <figure class="gallery-item"><img src="images/img4.png" alt="Failure Run 4" onclick="zoomImage(this)"></figure>
            <figure class="gallery-item"><img src="images/img5.png" alt="Failure Run 5" onclick="zoomImage(this)"></figure>
            <figure class="gallery-item"><img src="images/img6.png" alt="Failure Run 6" onclick="zoomImage(this)"></figure>
            <figure class="gallery-item"><img src="images/img7.png" alt="Failure Run 7" onclick="zoomImage(this)"></figure>
            <figure class="gallery-item"><img src="images/img1.png" alt="Failure Run 1" onclick="zoomImage(this)"></figure>
            <figure class="gallery-item"><img src="images/img2.png" alt="Failure Run 2" onclick="zoomImage(this)"></figure>
            <figure class="gallery-item"><img src="images/img3.png" alt="Failure Run 3" onclick="zoomImage(this)"></figure>
            <figure class="gallery-item"><img src="images/img8.png" alt="Failure Run 8" onclick="zoomImage(this)"></figure>
            <figure class="gallery-item"><img src="images/img9.png" alt="Failure Run 9" onclick="zoomImage(this)"></figure>
            <figure class="gallery-item"><img src="images/img10.png" alt="Failure Run 10" onclick="zoomImage(this)"></figure>
            <figure class="gallery-item"><img src="images/img17.png" alt="Failure Run 17" onclick="zoomImage(this)"></figure>
            <figure class="gallery-item"><img src="images/img18.png" alt="Failure Run 18" onclick="zoomImage(this)"></figure>
            <figure class="gallery-item"><img src="images/img11.png" alt="Failure Run 11" onclick="zoomImage(this)"></figure>
            <figure class="gallery-item"><img src="images/img12.png" alt="Failure Run 12" onclick="zoomImage(this)"></figure>
            <figure class="gallery-item"><img src="images/img13.png" alt="Failure Run 13" onclick="zoomImage(this)"></figure>
            <figure class="gallery-item"><img src="images/img14.png" alt="Failure Run 14" onclick="zoomImage(this)"></figure>
            <figure class="gallery-item"><img src="images/img15.png" alt="Failure Run 15" onclick="zoomImage(this)"></figure>
            <figure class="gallery-item"><img src="images/img16.png" alt="Failure Run 16" onclick="zoomImage(this)"></figure>
            <figure class="gallery-item"><img src="images/img19.png" alt="Failure Run 19" onclick="zoomImage(this)"></figure>
            <figure class="gallery-item"><img src="images/img20.png" alt="Failure Run 20" onclick="zoomImage(this)"></figure>
            <figure class="gallery-item"><img src="images/img21.png" alt="Failure Run 21" onclick="zoomImage(this)"></figure>
            <figure class="gallery-item"><img src="images/img22.png" alt="Failure Run 22" onclick="zoomImage(this)"></figure>
            <figure class="gallery-item"><img src="images/img23.png" alt="Failure Run 23" onclick="zoomImage(this)"></figure>
            <figure class="gallery-item"><img src="images/img24.png" alt="Failure Run 24" onclick="zoomImage(this)"></figure>
        </div>
    </main>
    <div class="overlay" id="overlay" onclick="closeZoom()"></div>

    <script>
        let activeZoomImage = null;

        function zoomImage(image) {
            if (activeZoomImage) {
                closeZoom();
                return;
            }

            const overlay = document.getElementById('overlay');
            const rect = image.getBoundingClientRect();
            const zoomed = image.cloneNode(true);

            zoomed.classList.add('zoom-image');
            zoomed.style.top = rect.top + 'px';
            zoomed.style.left = rect.left + 'px';
            zoomed.style.width = rect.width + 'px';
            zoomed.style.height = rect.height + 'px';

            document.body.appendChild(zoomed);
            image.classList.add('zoomed');
            overlay.classList.add('active');
            activeZoomImage = { source: image, clone: zoomed };

            const maxWidth = Math.min(window.innerWidth * 0.88, 1100);
            const maxHeight = window.innerHeight * 0.88;
            const aspect = rect.width / rect.height;

            let finalWidth = maxWidth;
            let finalHeight = finalWidth / aspect;

            if (finalHeight > maxHeight) {
                finalHeight = maxHeight;
                finalWidth = finalHeight * aspect;
            }

            requestAnimationFrame(() => {
                zoomed.style.top = ((window.innerHeight - finalHeight) / 2) + 'px';
                zoomed.style.left = ((window.innerWidth - finalWidth) / 2) + 'px';
                zoomed.style.width = finalWidth + 'px';
                zoomed.style.height = finalHeight + 'px';
            });
        }

        function closeZoom() {
            if (!activeZoomImage) return;

            const { source, clone } = activeZoomImage;
            const overlay = document.getElementById('overlay');
            const rect = source.getBoundingClientRect();

            clone.style.top = rect.top + 'px';
            clone.style.left = rect.left + 'px';
            clone.style.width = rect.width + 'px';
            clone.style.height = rect.height + 'px';

            overlay.classList.remove('active');
            source.classList.remove('zoomed');

            clone.addEventListener('transitionend', function handleEnd() {
                clone.removeEventListener('transitionend', handleEnd);
                clone.remove();
            });

            activeZoomImage = null;
        }
    </script>
</body>
</html>
