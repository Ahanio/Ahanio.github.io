name: Trigger Free-Range Gaussians site deploy

on:
  push:
    branches: [master]
    paths:
      - "free_range_gs/**"

jobs:
  trigger-frg-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger FRG site deployment
        run: |
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.FRG_PAGES_DISPATCH_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/free-range-gaussians/free-range-gaussians.github.io/dispatches \
            -d '{"event_type":"deploy-frg-site"}'
